# NurseTimer — declarative Xcode project (XcodeGen)
#
# Generate with:  make project   (or: xcodegen generate --spec project.yml)
#
# NOTE: this file was authored WITHOUT a Mac and has NOT been run through XcodeGen
# or Xcode. Treat generation + build as unverified until a Mac completes the
# "Verify on Mac" checklist in README.md.
#
# Targets:
#   NurseTimer         iOS app                 com.nursetimer.app
#   NurseTimerWatch    watchOS companion app   com.nursetimer.app.watch
#   NurseTimerWidget   WidgetKit extension     com.nursetimer.app.watch.widget
#   NurseTimerAppTests iOS unit-test bundle    com.nursetimer.app.tests
# Plus the local Swift package products NurseTimerCore / NurseTimerModels.

name: NurseTimer

options:
  bundleIdPrefix: com.nursetimer
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Local Swift package holding the tested scheduling core.
packages:
  NurseTimer:
    path: .

# Shared build settings. Automatic signing; NO development team hardcoded — each
# developer selects their team locally in Xcode.
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_STRICT_CONCURRENCY: complete

targets:

  # ─────────────────────────── iOS application ───────────────────────────
  NurseTimer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: NurseTimer
        product: NurseTimerCore
      - package: NurseTimer
        product: NurseTimerModels
      - target: NurseTimerWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nursetimer.app
        PRODUCT_NAME: NurseTimer
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/NurseTimer.entitlements
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only (spec §1.3)

  # ────────────────────────── watchOS companion ──────────────────────────
  NurseTimerWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Watch
    dependencies:
      - package: NurseTimer
        product: NurseTimerCore
      - target: NurseTimerWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nursetimer.app.watch
        PRODUCT_NAME: NurseTimer
        INFOPLIST_FILE: Watch/Info.plist
        CODE_SIGN_ENTITLEMENTS: Watch/NurseTimerWatch.entitlements

  # ──────────────────── WidgetKit extension (watch) ──────────────────────
  NurseTimerWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Widget
    dependencies:
      - package: NurseTimer
        product: NurseTimerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nursetimer.app.watch.widget
        PRODUCT_NAME: NurseTimerWidget
        INFOPLIST_FILE: Widget/Info.plist

  # ─────────────────────── iOS unit-test bundle ──────────────────────────
  NurseTimerAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppTests
    dependencies:
      - target: NurseTimer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nursetimer.app.tests

schemes:
  NurseTimer:
    build:
      targets:
        NurseTimer: all
    test:
      targets:
        - NurseTimerAppTests
  NurseTimerWatch:
    build:
      targets:
        NurseTimerWatch: all
